<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 | 宠忆</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .auth-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f5a623;
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-auth:hover {
            opacity: 0.9;
        }
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .auth-link a {
            color: #f5a623;
            text-decoration: none;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .success-msg {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .loading {
            text-align: center;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="auth-title">🐾 加入宠忆</h1>
        <form id="registerForm">
            <div class="form-group">
                <label>昵称 / Name</label>
                <input type="text" id="name" required placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>邮箱 / Email</label>
                <input type="email" id="email" required placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码 / Password</label>
                <input type="password" id="password" required placeholder="请输入密码（至少6位）" minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码 / Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="请再次输入密码" minlength="6">
            </div>
            <button type="submit" class="btn-auth" id="submitBtn">注册</button>
            <div id="message"></div>
        </form>
        <div class="auth-link">
            已有账号？<a href="login.html">立即登录</a>
        </div>
        <div class="auth-link" style="margin-top:10px;">
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://pet-memorial-api-new.onrender.com';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                msg.innerHTML = '<p class="error-msg">两次密码输入不一致</p>';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            msg.innerHTML = '<p class="loading">请稍候...</p>';
            
            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    msg.innerHTML = '<p class="success-msg">注册成功！即将跳转到登录...</p>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    msg.innerHTML = `<p class="error-msg">${data.error || '注册失败'}</p>`;
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (err) {
                msg.innerHTML = '<p class="error-msg">网络错误，请稍后再试</p>';
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
